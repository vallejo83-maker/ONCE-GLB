<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Interactivo 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            height: 100vh; 
            background-color: #f5f5f5;
        }

        /* Panel Lateral */
        .sidebar {
            width: 320px;
            background: white;
            padding: 30px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        h1 { font-size: 1.5rem; color: var(--primary-color); margin-bottom: 20px; }

        label { font-weight: bold; margin-bottom: 8px; display: block; color: #666; }

        /* Estilo del Desplegable */
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #ddd;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus { border-color: var(--accent-color); }

        /* Cuadro de Descripción */
        .description-box {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
        }

        .description-box h2 { font-size: 1.1rem; margin-top: 0; }
        .description-box p { font-size: 0.95rem; line-height: 1.5; color: #444; }

        /* Visor 3D */
        .viewer-container {
            flex-grow: 1;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #eee;
        }

        /* Adaptabilidad para móviles */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: auto; height: auto; order: 2; padding: 20px; }
            .viewer-container { height: 60vh; order: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Mobiliario Pro</h1>
        
        <label for="model-selector">Selecciona un modelo:</label>
        <select id="model-selector" onchange="actualizarEscena()">
            <option value="bench.glb">Bench Operativo</option>
            <option value="despacho_3.glb">Despacho Ejecutivo 3</option>
            <option value="mesa_reunion_pua.glb">Mesa de Reunión Púa</option>
        </select>

        <div class="description-box">
            <h2 id="desc-title">Bench Operativo</h2>
            <p id="desc-text">Sistema de mesas compartidas diseñado para optimizar espacios de trabajo colaborativos. Acabados ergonómicos y gestión de cableado integrada.</p>
        </div>
    </div>

    <div class="viewer-container">
        <model-viewer id="visor"
            src="bench.glb" 
            alt="Visualizador de muebles 3D" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1"
            touch-action="pan-y">
        </model-viewer>
    </div>

    <script>
        // Objeto con las descripciones de cada modelo
        const infoModelos = {
            "bench.glb": {
                titulo: "Bench Operativo",
                descripcion: "Sistema de mesas compartidas diseñado para optimizar espacios de trabajo colaborativos. Acabados ergonómicos y gestión de cableado integrada."
            },
            "despacho_3.glb": {
                titulo: "Despacho Ejecutivo 3",
                descripcion: "Conjunto de alta dirección con acabados en madera premium. Incluye mesa principal de gran formato y ala auxiliar para reuniones privadas."
            },
            "mesa_reunion_pua.glb": {
                titulo: "Mesa de Reunión Púa",
                descripcion: "Mesa de diseño orgánico con forma de púa, ideal para fomentar la comunicación en equipos creativos. Capacidad para 6-8 personas."
            }
        };

        function actualizarEscena() {
            const selector = document.getElementById('model-selector');
            const visor = document.getElementById('visor');
            const titulo = document.getElementById('desc-title');
            const texto = document.getElementById('desc-text');
            
            const modeloSeleccionado = selector.value;
            const info = infoModelos[modeloSeleccionado];

            // Cambiar modelo 3D
            visor.src = modeloSeleccionado;

            // Cambiar textos
            titulo.innerText = info.titulo;
            texto.innerText = info.descripcion;
        }
    </script>

</body>
</html>
