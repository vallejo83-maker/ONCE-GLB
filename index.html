<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo ONCE X Steelcase</title>
    <!-- Componente Model Viewer de Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            /* Color extraído del logo: Gris corporativo Steelcase */
            --steelcase-gray: #666666; 
            --dark-gray: #333333;
            --light-bg: #f4f4f4;
            --accent-line: #999999;
        }

        body { 
            margin: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; 
            height: 100vh; 
            background-color: var(--light-bg);
            color: var(--dark-gray);
        }

        /* Barra Lateral Izquierda */
        .sidebar {
            width: 350px;
            background: white;
            padding: 25px;
            box-shadow: 4px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
        }

        .brand-header {
            border-bottom: 2px solid var(--steelcase-gray);
            margin-bottom: 25px;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .brand-header .brand-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            margin: 0;
            color: var(--steelcase-gray);
            text-transform: uppercase;
            font-weight: 700;
        }

        /* Estilo para el logo subido */
        .brand-logo {
            height: 28px; 
            width: auto;
            display: block;
        }

        /* Selector Desplegable */
        .control-group { margin-bottom: 25px; }
        label { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: #999; margin-bottom: 8px; display: block; }
        
        select {
            width: 100%;
            padding: 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
            background: #fff;
            cursor: pointer;
            outline: none;
            color: var(--dark-gray);
        }

        select:focus {
            border-color: var(--steelcase-gray);
        }

        /* Sección de Texto */
        .info-section { margin-bottom: 30px; }
        #desc-title { font-size: 1.3rem; margin: 0 0 10px 0; color: var(--dark-gray); font-weight: 600; }
        #desc-text { font-size: 0.95rem; line-height: 1.6; color: #555; }

        /* Carrusel de Imágenes */
        .carousel-container {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .carousel-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 12px; color: #999; text-transform: uppercase; }
        
        .carousel {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }

        .carousel::-webkit-scrollbar { height: 4px; }
        .carousel::-webkit-scrollbar-track { background: #f1f1f1; }
        .carousel::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

        .carousel img {
            width: 110px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            background: #eee;
            flex-shrink: 0;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .carousel img:hover { border-color: var(--steelcase-gray); }

        /* Visor 3D Principal */
        .viewer-area {
            flex-grow: 1;
            background-color: #ffffff;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --progress-bar-color: var(--steelcase-gray);
            background-color: #ffffff;
        }

        /* Responsive */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: auto; height: 45vh; order: 2; padding: 20px; }
            .viewer-area { height: 55vh; order: 1; }
            .brand-logo { height: 22px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-header">
            <div class="brand-title">
                <span>ONCE X</span>
                <!-- Imagen del logo proporcionada por el usuario -->
                <img src="SC_Core_424_LG.jpg" alt="Steelcase Logo" class="brand-logo">
            </div>
        </div>
        
        <div class="control-group">
            <label for="model-selector">Configuración de Producto</label>
            <select id="model-selector" onchange="actualizarTodo()">
                <option value="bench.glb">Bench Operativo</option>
                <option value="despacho_3.glb">Despacho Ejecutivo 3</option>
                <option value="mesa_reunion_pua.glb">Mesa Reunión Púa</option>
            </select>
        </div>

        <div class="info-section">
            <h2 id="desc-title">Cargando...</h2>
            <p id="desc-text">Por favor, espera mientras se carga la información del mobiliario.</p>
        </div>

        <div class="carousel-container">
            <div class="carousel-title">Galería de Referencia</div>
            <div id="image-carousel" class="carousel">
                <!-- Imágenes dinámicas -->
            </div>
        </div>
    </div>

    <div class="viewer-area">
        <model-viewer id="main-visor"
            src="bench.glb" 
            alt="Mobiliario 3D Steelcase" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1.2"
            exposure="0.8"
            shadow-softness="1"
            touch-action="pan-y">
        </model-viewer>
    </div>

    <script>
        // BASE DE DATOS DE LOS MODELOS Y CONTENIDO
        const database = {
            "bench.glb": {
                titulo: "Bench Operativo",
                descripcion: "Sistema de estaciones de trabajo configurables Steelcase. Diseñado para optimizar la colaboración en espacios abiertos, manteniendo la gestión eficiente de cableado y la ergonomía del usuario.",
                imagenes: [
                    "https://picsum.photos/id/20/200/150", 
                    "https://picsum.photos/id/21/200/150", 
                    "https://picsum.photos/id/22/200/150"
                ]
            },
            "despacho_3.glb": {
                titulo: "Despacho Ejecutivo 3",
                descripcion: "Conjunto directivo premium que proyecta profesionalismo y solidez. Superficies de trabajo amplias con acabados de alta calidad y detalles en metal que siguen la línea estética de Steelcase.",
                imagenes: [
                    "https://picsum.photos/id/24/200/150",
                    "https://picsum.photos/id/25/200/150",
                    "https://picsum.photos/id/26/200/150"
                ]
            },
            "mesa_reunion_pua.glb": {
                titulo: "Mesa Reunión Púa",
                descripcion: "Diseño ergonómico que facilita la interacción visual. Esta mesa de reunión es ideal para espacios de toma de decisiones, permitiendo una integración fluida de tecnología y conectividad.",
                imagenes: [
                    "https://picsum.photos/id/30/200/150",
                    "https://picsum.photos/id/31/200/150",
                    "https://picsum.photos/id/32/200/150"
                ]
            }
        };

        function actualizarTodo() {
            const selector = document.getElementById('model-selector');
            const visor = document.getElementById('main-visor');
            const titulo = document.getElementById('desc-title');
            const texto = document.getElementById('desc-text');
            const carrusel = document.getElementById('image-carousel');
            
            const modeloId = selector.value;
            const data = database[modeloId];

            if (!data) return;

            // Cambiar Modelo 3D
            visor.src = modeloId;

            // Cambiar Textos
            titulo.innerText = data.titulo;
            texto.innerText = data.descripcion;

            // Reconstruir Carrusel
            carrusel.innerHTML = ""; 
            data.imagenes.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.alt = "Vista de " + data.titulo;
                img.onclick = () => window.open(url, '_blank');
                carrusel.appendChild(img);
            });
        }

        // Inicialización
        window.onload = actualizarTodo;
    </script>

</body>
</html>
