<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCE X Steelcase</title>
    
    <!-- Librerías Externas -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    
    <style>
        :root {
            /* Gris corporativo Steelcase */
            --steelcase-gray: #666666; 
            --dark-gray: #333333;
            --light-bg: #f4f4f4;
        }

        body { 
            margin: 0; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            display: flex; 
            height: 100vh; 
            background-color: var(--light-bg);
            color: var(--dark-gray);
            overflow: hidden;
        }

        /* Diseño de la interfaz */
        .sidebar {
            width: 380px;
            background: white;
            padding: 25px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 20;
            overflow-y: auto;
        }

        .viewer-area {
            flex-grow: 1;
            background-color: #ffffff;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            --progress-bar-color: var(--steelcase-gray);
        }

        /* Cabecera con logotipos */
        .brand-header {
            border-bottom: 2px solid var(--steelcase-gray);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .brand-title {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
        }

        .brand-logo-once { height: 32px; width: auto; }
        .brand-logo-steelcase { height: 26px; width: auto; }
        .collab-x { font-weight: bold; color: var(--steelcase-gray); font-size: 1.2rem; }

        /* Estilos del carrusel */
        .carousel img {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            flex-shrink: 0;
            background: #f0f0f0;
        }
        .carousel img:hover { 
            border-color: var(--steelcase-gray);
            transform: scale(1.02);
        }

        /* Scrollbar personalizado para el carrusel */
        .carousel::-webkit-scrollbar { height: 5px; }
        .carousel::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .carousel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: auto; height: 45vh; order: 2; padding: 20px; }
            .viewer-area { height: 55vh; order: 1; }
        }
    </style>
</head>
<body>

    <!-- Panel Lateral de Control -->
    <div class="sidebar">
        <div class="brand-header">
            <div class="brand-title">
                <img src="ONCE.png" alt="Logo ONCE" class="brand-logo-once">
                <span class="collab-x">X</span>
                <img src="SC_Core_424_LG.jpg" alt="Logo Steelcase" class="brand-logo-steelcase">
            </div>
        </div>
        
        <div class="mb-8">
            <label class="block text-xs font-bold uppercase text-gray-400 mb-2 tracking-widest">Catálogo de Productos</label>
            <select id="model-selector" class="w-full p-4 border rounded-xl bg-white outline-none focus:ring-2 focus:ring-gray-200 shadow-sm transition-all text-gray-700 font-semibold" onchange="seleccionarProducto(this.value)">
                <!-- El catálogo se genera por JavaScript -->
            </select>
        </div>

        <div id="info-content" class="mb-8">
            <h2 id="desc-title" class="text-2xl font-bold mb-3 text-gray-800">Cargando...</h2>
            <p id="desc-text" class="text-sm leading-relaxed text-gray-500 italic">Espere mientras se carga la configuración del modelo.</p>
        </div>

        <div class="mt-auto">
            <label class="block text-xs font-bold uppercase text-gray-400 mb-3 tracking-widest">Galería de Imágenes</label>
            <div id="image-carousel" class="carousel flex gap-4 overflow-x-auto pb-4">
                <!-- Imágenes cargadas dinámicamente -->
            </div>
        </div>
        
        <div class="mt-6 pt-6 border-t border-gray-100 flex justify-between items-center text-[10px] text-gray-400 uppercase tracking-widest font-bold">
            <span>© ONCE X Steelcase</span>
            <span class="opacity-50">Visualizador 3D v2.1</span>
        </div>
    </div>

    <!-- Área de Visualización 3D -->
    <div class="viewer-area">
        <model-viewer id="main-visor"
            src="" 
            alt="Mobiliario Steelcase 3D" 
            auto-rotate 
            camera-controls 
            shadow-intensity="1.5"
            exposure="1"
            shadow-softness="1"
            touch-action="pan-y">
        </model-viewer>
    </div>

    <script>
        /**
         * BASE DE DATOS DE PRODUCTOS
         * Aquí es donde se configuran los modelos y sus imágenes asociadas.
         */
        const CATALOGO = [
            {
                id: "bench",
                nombre: "Bench Operativo",
                archivoGlb: "bench.glb",
                descripcion: "Sistema de mesas de trabajo compartidas. Optimiza la colaboración y el espacio manteniendo la ergonomía y una gestión de cableado oculta y eficiente.",
                imagenes: ["bench1.jpg", "bench2.jpg", "bench3.jpg", "bench4.jpg"]
            },
            {
                id: "mesa-reunion-pua",
                nombre: "Mesa Reunión Púa",
                archivoGlb: "mesa_reunion_pua.glb",
                descripcion: "Diseño orgánico en forma de púa que facilita el contacto visual entre todos los participantes. Ideal para sesiones creativas y de toma de decisiones.",
                imagenes: ["pua1.jpg"]
            },
            {
                id: "despacho-ala-elevable",
                nombre: "Despacho Ala Elevable",
                archivoGlb: "despacho_ala_elevable.glb",
                descripcion: "Conjunto ejecutivo de alta dirección. Incorpora una superficie regulable en altura que fomenta el bienestar y el dinamismo durante la jornada laboral.",
                imagenes: ["despacho_ala_elevable1.jpg", "despacho_ala_elevable2.jpg", "despacho_ala_elevable3.jpg"]
            },
            {
                id: "despacho-ala-fija",
                nombre: "Despacho Ala Fija",
                archivoGlb: "despacho_ala_fija.glb",
                descripcion: "Conjunto ejecutivo de alta dirección. Incorpora una superficie regulable en altura que fomenta el bienestar y el dinamismo durante la jornada laboral.",
                imagenes: ["despacho_ala_elevable1.jpg", "despacho_ala_elevable2.jpg", "despacho_ala_elevable3.jpg"]
            },
            {
                id: "mesa-plenos",
                nombre: "Mesa Reunión Plenos",
                archivoGlb: "mesa_plenos.glb",
                descripcion: "Mesa de juntas de gran formato con un diseño arquitectónico y minimalista. Proyecta una imagen de liderazgo y solidez en salas de plenos y consejos de administración. Ofrece una superficie de trabajo expansiva y limpia, ideal para la integración discreta de tecnología y soporte multimedia en reuniones de alto nivel.",
                imagenes: ["plenos1.jpg"]
            },
            {
                id: "mesa-reunion",
                nombre: "Mesa Reunión Rectangular",
                archivoGlb: "mesa_reunion.glb",
                descripcion: "Solución versátil para salas de conferencias. Estructura robusta y superficie amplia diseñada para integrar tecnología y conectividad de forma fluida.",
                imagenes: ["reunion1.jpg"]
            }
        ];

        /**
         * LÓGICA DE ACTUALIZACIÓN
         */
        function inicializarApp() {
            const selector = document.getElementById('model-selector');
            
            // Llenar el desplegable con los nombres del catálogo
            selector.innerHTML = CATALOGO.map(p => 
                `<option value="${p.id}">${p.nombre}</option>`
            ).join('');
            
            // Cargar el primer producto por defecto
            seleccionarProducto(CATALOGO[0].id);
        }

        window.seleccionarProducto = (id) => {
            const data = CATALOGO.find(p => p.id === id);
            if (!data) return;

            const visor = document.getElementById('main-visor');
            const titulo = document.getElementById('desc-title');
            const texto = document.getElementById('desc-text');
            const carrusel = document.getElementById('image-carousel');

            // Actualizar Modelo 3D y Textos descriptivos
            visor.src = data.archivoGlb;
            titulo.innerText = data.nombre;
            texto.innerText = data.descripcion;
            
            // Limpiar y actualizar el carrusel de imágenes
            carrusel.innerHTML = '';
            data.imagenes.forEach(nombreFoto => {
                const img = document.createElement('img');
                img.src = nombreFoto;
                img.alt = `Vista de ${data.nombre}`;
                
                // Opción para abrir la imagen en grande al hacer clic
                img.onclick = () => window.open(nombreFoto, '_blank');
                
                carrusel.appendChild(img);
            });
        }

        // Iniciar la plataforma al cargar la ventana
        window.onload = inicializarApp;
    </script>

    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

</body>
</html>
